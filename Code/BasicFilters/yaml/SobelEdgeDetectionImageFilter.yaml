name: SobelEdgeDetectionImageFilter
template_code_filename: ImageFilter
template_test_filename: ImageFilter
number_of_inputs: 1
doc: Some global documentation
pixel_types: RealPixelIDTypeList
members: [
  {
    name: UseLegacyOperatorCoefficients,
    type: bool,
    default: 'false',
    doc: Set/Get whether to use the legacy Sobel operator coefficients (compatible with ITK <= 5.4).
  }
]
tests:
- tag: defaults
  description: Simply run with default settings
  settings:
    - parameter: UseLegacyOperatorCoefficients
      type: bool
      value: 'true'
      python_value: "True"
      R_value: "TRUE"
  tolerance: 0.01
  inputs:
  - Input/RA-Float.nrrd
briefdescription: A 2D or 3D edge detection using the Sobel operator.
detaileddescription: >-
  This filter uses the Sobel operator to calculate the image gradient and then finds the magnitude of this gradient vector.
  The Sobel gradient magnitude (square-root sum of squares) is an indication of edge strength.


  \see ImageToImageFilter



  \see SobelOperator



  \see Neighborhood



  \see NeighborhoodOperator



  \see NeighborhoodIterator
itk_module: ITKImageFeature
itk_group: ImageFeature
in_place: false
