name: Batch Build and Test

on:
  push:
   branches: ['master', 'main', 'release']
  pull_request:
    paths:
      - .github/workflows/BatchBuild.yml

  # Enable manual running of workflow
  workflow_dispatch:

concurrency:
  group: '${{ github.workflow }}@${{ github.head_ref || github.ref }}'
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# Set minimal permissions for all jobs (read-only)
permissions:
  contents: read
  actions: read

env:
  DEFAULT_PYTHON_VERSION: "3.11"
  DEFAULT_R_VERSION: "4.5"

jobs:
  build:
    # The CMake configure and build commands are platform-agnostic and should work a cross
    # platforms.
    runs-on: ${{ matrix.os }}
    env:
      CTEST_SOURCE_DIRECTORY: "${{ github.workspace }}"
      CTEST_BINARY_DIRECTORY: "${{ github.workspace }}/bld"
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        include:
          - os: mac-arm64
            cmake-build-type: "Release"
            cmake-generator: "Ninja"
            cmake_osx_architectures: "arm64"
            use-superbuild: true
            ctest-cache: |
              WRAP_PYTHON:BOOL=ON
              WRAP_JAVA:BOOL=ON
              SimpleITK_USE_ELASTIX:BOOL=ON

          - os: mac-arm64
            cmake-build-type: "RelMinSize"
            cmake-generator: "Ninja"
            use-superbuild: false
            ctest-cache: |
              WRAP_PYTHON:BOOL=ON
              CMAKE_CXX_FLAGS:STRING=-fvisibility=hidden -fvisibility-inlines-hidden
              CMAKE_C_FLAGS:STRING=-fvisibility=hidden
              CMAKE_CXX_VISIBILITY_PRESET:STRING=hidden
              CMAKE_VISIBILITY_INLINES_HIDDEN:BOOL=ON
              CMAKE_OSX_ARCHITECTURES:STRING=x86_64

          - os: windows-2022
            cmake-build-type: "MinSizeRel"
            cmake-generator: "Visual Studio 17 2022"
            cmake-generator-toolset: v143,host=x64
            use-superbuild: false
            cmake-generator-platform: x64
            ctest-cache: |
              BUILD_EXAMPLES:BOOL=ON
              CXXFLAGS:STRING= /wd4251 /MP

          - os: windows-2022
            cmake-build-type: "MinSizeRel"
            cmake-generator: "Visual Studio 17 2022"
            cmake-generator-toolset: v143,host=x64
            cmake-generator-platform: x64
            use-superbuild: true
            ctest-cache: |
              WRAP_DEFAULT:BOOL=OFF
              CXXFLAGS:STRING= /wd4251 /MP
              BUILD_SHARED_LIBS:BOOL=ON

          - os: windows-2022
            cmake-build-type: "Release"
            cmake-generator: "Visual Studio 17 2022"
            cmake-generator-toolset: v142,host=x64
            cmake-generator-platform: x64
            use-superbuild: true
            ctest-cache: |
              SimpleITK_USE_ELASTIX:BOOL=ON
              WRAP_CSHARP:BOOL=ON
              WRAP_PYTHON:BOOL=ON
              WRAP_JAVA:BOOL=ON
              ITK_USE_BUILD_DIR:BOOL=ON
              CXXFLAGS:STRING= /wd4251 /MP

          - os: ubuntu-24.04-arm
            cmake-build-type: "Release"
            cmake-generator: "Ninja"
            use-superbuild: true
            ctest-cache: |
              WRAP_PYTHON:BOOL=ON
              WRAP_JAVA:BOOL=ON
              WRAP_R:BOOL=ON
              SimpleITK_USE_ELASTIX:BOOL=ON

          - os: ubuntu-24.04
            cmake-build-type: "Release"
            cmake-generator: "Ninja"
            apt-get-dependencies: "liblua5.3-dev lua5.3"
            r-version: "4.0"
            use-superbuild: true
            ctest-cache: |
              WRAP_PYTHON:BOOL=ON
              WRAP_LUA:BOOL=ON
              WRAP_R:BOOL=ON
              SimpleITK_USE_ELASTIX:BOOL=ON

          - os: ubuntu-24.04
            cmake-build-type: "Release"
            cmake-generator: "Ninja"
            use-superbuild: true
            ctest-cache: |
              ITK_GIT_TAG:STRING=main

          - os: ubuntu-22.04
            cmake-build-type: "Release"
            cmake-generator: "Ninja"
            use-superbuild: false
            CXX: "g++-10"
            CC: "gcc-10"
            ctest-cache: |
              WRAP_DEFAULT:BOOL=OFF

          - os: ubuntu-22.04
            cmake-build-type: "Release"
            cmake-generator: "Ninja"
            CXX: "g++-12"
            CC: "gcc-12"
            use-superbuild: true
            ctest-cache: |
              WRAP_DEFAULT:BOOL=OFF

          - os: macos-15
            cmake-build-type: "Release"
            cmake-generator: "Ninja"
            xcode-version: 16.4
            use-superbuild: true
            ctest-cache: |
              WRAP_PYTHON:BOOL=ON
              WRAP_R:BOOL=ON

          - os: macos-14
            cmake-build-type: "Release"
            cmake-generator: "Ninja"
            use-superbuild: false
            xcode-version: 15.4
            python-version: "3.10"
            ctest-cache: |
              WRAP_PYTHON:BOOL=ON

          - os: macos-14
            cmake-build-type: "MinSizeRel"
            cmake-generator: "Ninja"
            xcode-version: 16.2
            python-version: "3.13"
            use-superbuild: true
            ctest-cache: |
              WRAP_PYTHON:BOOL=ON
              WRAP_JAVA:BOOL=ON

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: "${{ github.event.pull_request.head.sha }}"
      - uses: actions/checkout@v6
        with:
          path: SimpleITK-dashboard
          ref: dashboard
      - uses: ./.github/actions/external-data-cache
        with:
          path: ${{ runner.temp }}/.ExternalData
          save: ${{ github.event_name != 'pull_request' }}
      - name: Install R
        if: contains(matrix.ctest-cache, 'WRAP_R')
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.r-version || env.DEFAULT_R_VERSION }}
      - name: Set up Python ${{ matrix.python-version || env.DEFAULT_PYTHON_VERSION }}
        uses: actions/setup-python@v6
        id: cpy
        with:
          python-version: ${{ matrix.python-version || env.DEFAULT_PYTHON_VERSION }}
      - name: Update Path for shared libraries
        shell: bash
        if: ${{ contains(matrix.ctest-cache, 'BUILD_SHARED_LIBS:BOOL=ON') && contains(matrix.os, 'windows') }}
        run: |
          echo "${{ env.CTEST_BINARY_DIRECTORY }}\ITK-prefix\bin" >> $GITHUB_PATH
          echo "${{ env.CTEST_BINARY_DIRECTORY }}\SimpleITK-build\bin\${{ matrix.cmake-build-type }}" >> $GITHUB_PATH
      - name: Install build dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r ./.github/workflows/requirements-build.txt

          if [[ '${{ matrix.use-superbuild }}' != 'true' ]]; then
            python -m pip install jinja2~=3.1 jsonschema~=4.24 pyyaml~=6.0 swig~=4.4.0
          fi

          if [  ! -z "${{ matrix.xcode-version }}" ]; then
            sudo xcode-select -s /Applications/Xcode_${{ matrix.xcode-version }}.app/Contents/Developer/
            xcode-select -p
          fi

          if [ ! -z "${{ matrix.apt-get-dependencies }}" ]; then
            sudo apt-get update
            sudo apt-get install -y ${{ matrix.apt-get-dependencies }}
          fi

          if [[ "${{ contains(matrix.ctest-cache, 'WRAP_R') }}" == "true" ]]; then
            Rscript -e 'install.packages(c("argparser"))'
          fi

      - name: Build and Test
        shell: bash
        env:
          DASHBOARD_BRANCH_DIRECTORY: "${{ github.workspace }}/SimpleITK-dashboard"
          ITK_GLOBAL_DEFAULT_NUMBER_OF_THREADS: 2
          CTEST_CONFIGURATION_TYPE: ${{ matrix.cmake-build-type }}
          CTEST_CMAKE_GENERATOR: "${{ matrix.cmake-generator }}"
          CTEST_CMAKE_GENERATOR_TOOLSET: "${{ matrix.cmake-generator-toolset }}"
          CTEST_CMAKE_GENERATOR_PLATFORM: "${{ matrix.cmake-generator-platform }}"
          CTEST_OUTPUT_ON_FAILURE: 1
          CTEST_CACHE: |
            WRAP_DEFAULT:BOOL=OFF
            BUILD_EXAMPLES:BOOL=ON
            BUILD_TESTING:BOOL=ON
            Python_EXECUTABLE:FILEPATH=${{ steps.cpy.outputs.python-path }}
            ${{ !matrix.use-superbuild && 'SimpleITK_USE_SYSTEM_SWIG:BOOL=ON' || '' }}
            ${{ !matrix.use-superbuild && format('SimpleITK_Python_EXECUTABLE:FILEPATH={0}', steps.cpy.outputs.python-path) || '' }}
            ${{ matrix.ctest-cache }}
        run: |
          if [ ! -z "${{ matrix.GCC }} ]; then
            export CC=${{ matrix.CC }}
          fi
          if [ ! -z "${{ matrix.CXX }} ]; then
            export CXX=${{ matrix.CXX }}
          fi
          if [ ! -z "${{ matrix.cmake_build_parallel_level }}" ]; then
            export CMAKE_BUILD_PARALLEL_LEVEL=${{ matrix.cmake_build_parallel_level }}
          fi
          cmake --version
          ninja --version
          if [[ '${{ matrix.use-superbuild }}' == 'true' ]]; then
            DASHBOARD_SOURCE_CONFIG_DIR="SuperBuild"
          else
            DASHBOARD_SOURCE_CONFIG_DIR=""
          fi
          ctest -D dashboard_source_config_dir="${DASHBOARD_SOURCE_CONFIG_DIR}" -S ${CTEST_SOURCE_DIRECTORY}/.github/workflows/github_actions.cmake -V -j 2
