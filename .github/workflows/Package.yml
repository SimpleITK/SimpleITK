name: Package

on:
  push:
    tags:
      - 'latest'
      - 'v*'
    branches-ignore:
      - '**'
  pull_request:
    branches: [ master, main ]
    paths:
      - .github/workflows/Package.yml
  workflow_dispatch:

concurrency:
  group: '${{ github.workflow }}@${{ github.event.pull_request.head.sha || github.head_ref || github.ref }}'

# Set minimal permissions for all jobs (read-only)
permissions:
  contents: read
  actions: read

jobs:
  package-docker:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        include:
          - os: ubuntu-latest
            dockerfile: Dockerfile-2-28-x86_64
            build_csharp: 1
            build_java: 1
          - os: ubuntu-22.04-arm
            dockerfile: Dockerfile-2-28-aarch64
            build_csharp: 0
            build_java: 1
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
        with:
          fetch-depth: 0
      - name: Docker Build Image
        shell: bash
        working-directory: Utilities/Distribution/manylinux
        run: |
          docker build --pull=true --rm=true -t simpleitk_manylinux -f "${{ matrix.dockerfile }}"   .
      - name: Build ${{ matrix.dockerfile }}
        shell: bash
        env:
          PYTHON_VERSIONS: "cp310-cp310 cp314-cp314t"
          BUILD_CSHARP: ${{ matrix.build_csharp }}
          BUILD_JAVA: ${{ matrix.build_java }}
          BUILD_PYTHON_LIMITED_API: 1
          SIMPLEITK_USE_ELASTIX: 1
        run: |
          echo "BUILD_CSHARP: ${BUILD_CSHARP}"
          echo "BUILD_JAVA: ${BUILD_JAVA}"
          docker run --rm \
               --user "$(id -u):$(id -g)" \
               --env PYTHON_VERSIONS \
               --env BUILD_CSHARP \
               --env BUILD_JAVA \
               --env BUILD_PYTHON_LIMITED_API \
               --env SIMPLEITK_USE_ELASTIX \
               --env SIMPLEITK_SRC_DIR="/work/src" \
               -v "${{ github.workspace }}:/work/src" \
               -v "${{ github.workspace }}/Utilities/Distribution/manylinux:/work/io" \
               -t simpleitk_manylinux
      - name: ls
        shell: bash
        working-directory: Utilities/Distribution/manylinux
        run: |
          ls -lhR .
      - name: Upload Artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: artifacts-${{ matrix.os }}-${{matrix.dockerfile}}
          path: |
            Utilities/Distribution/manylinux/wheelhouse/*.whl
            Utilities/Distribution/manylinux/SimpleITK*.zip

  build:
    if: github.repository == 'SimpleITK/SimpleITK'
    runs-on: ${{ matrix.os }}
    env:
      COREBINARYDIRECTORY:  "${{ github.workspace }}/bld"
      ExternalData_OBJECT_STORES: "${{ github.workspace }}/.ExternalData"
      DASHBOARD_BRANCH_DIRECTORY: "${{ github.workspace }}/SimpleITK-dashboard"
      CTEST_SOURCE_DIRECTORY: "${{ github.workspace }}"
      CTEST_CONFIGURATION_TYPE: "${{ matrix.cmake-build-type }}"
      CTEST_CMAKE_GENERATOR: "${{ matrix.cmake-generator }}"
      CTEST_CMAKE_GENERATOR_TOOLSET: "${{ matrix.cmake-generator-toolset }}"
      CTEST_CMAKE_GENERATOR_PLATFORM: "${{ matrix.cmake-generator-platform }}"
    strategy:
      fail-fast: false
      max-parallel: 5
      matrix:
        include:
          - os: macos-15-intel
            cmake-build-type: "Release"
            cmake-generator: "Ninja"
            ctest-cache: |
              CMAKE_CXX_FLAGS:STRING=-fvisibility=hidden -fvisibility-inlines-hidden
              CMAKE_C_FLAGS:STRING=-fvisibility=hidden
              CMAKE_OSX_DEPLOYMENT_TARGET=10.9
              ITK_C_OPTIMIZATION_FLAGS:STRING=
              ITK_CXX_OPTIMIZATION_FLAGS:STRING=
              SimpleITK_BUILD_DISTRIBUTE:BOOL=ON
              SimpleITK_BUILD_STRIP:BOOL=1
          - os: macos-15
            cmake-build-type: "Release"
            cmake-generator: "Ninja"
            ctest-cache: |
              CMAKE_CXX_FLAGS:STRING=-fvisibility=hidden -fvisibility-inlines-hidden
              CMAKE_C_FLAGS:STRING=-fvisibility=hidden
              CMAKE_OSX_DEPLOYMENT_TARGET=11.0
              ITK_C_OPTIMIZATION_FLAGS:STRING=
              ITK_CXX_OPTIMIZATION_FLAGS:STRING=
              SimpleITK_BUILD_DISTRIBUTE:BOOL=ON
              SimpleITK_BUILD_STRIP:BOOL=1
          - os: windows-2022
            cmake-build-type: "Release"
            cmake-generator: "Visual Studio 17 2022"
            cmake-generator-toolset: v142,host=x64
            cmake-generator-platform: x64
            ctest-cache: |
              BUILD_EXAMPLES:BOOL=ON
              BUILD_TESTING:BOOL=ON
              ITK_C_OPTIMIZATION_FLAGS:STRING=
              ITK_CXX_OPTIMIZATION_FLAGS:STRING=
              SimpleITK_BUILD_DISTRIBUTE:BOOL=ON
              CXXFLAGS:STRING= /MP
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
        with:
          fetch-depth: 0
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
        with:
          path: SimpleITK-dashboard
          ref: dashboard
      - uses: ./.github/actions/external-data-cache
        with:
          path: ${{ env.ExternalData_OBJECT_STORES }}
          save: ${{ github.event_name != 'pull_request' }}
      - name: Set up Python 3.11
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v6
        id: cpy
        with:
          python-version: 3.11

      - name: Install build dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r ./.github/workflows/requirements-build.txt

          if [  ! -z "${{ matrix.xcode-version }}" ]; then
            sudo xcode-select -s /Applications/Xcode_${{ matrix.xcode-version }}.app/Contents/Developer/
            xcode-select -p
          fi

      - name: Build and Test
        shell: bash
        env:
          ITK_GLOBAL_DEFAULT_NUMBER_OF_THREADS: 2
          CTEST_BINARY_DIRECTORY: "${{ env.COREBINARYDIRECTORY }}"
          CTEST_OUTPUT_ON_FAILURE: 1
          CTEST_CACHE: |
            WRAP_DEFAULT:BOOL=OFF
            BUILD_EXAMPLES:BOOL=ON
            BUILD_TESTING:BOOL=ON
            SimpleITK_USE_ELASTIX:BOOL=ON
            ${{ matrix.cmake_osx_architectures && format('CMAKE_OSX_ARCHITECTURES:STRING={0}', matrix.cmake_osx_architectures) || '' }}
            ${{ matrix.ctest-cache }}
        run: |
          cmake --version
          ninja --version
          ctest -D "dashboard_track:STRING=Package" -S ${CTEST_SOURCE_DIRECTORY}/.github/workflows/github_actions.cmake -VV

      - name: Generate Source and Data Archives
        shell: bash
        if: matrix.os == 'macos-15-intel'
        run: |
          set -xe

          Utilities/Maintenance/SourceTarball.bash --tgz --zip --verbose "${{ env.COREBINARYDIRECTORY }}/SimpleITK-build" ${{ github.sha }}
          mkdir -p ${{ github.workspace }}/artifacts
          ls -la
          shopt -s extglob
          mv SimpleITK@(Data|)-*@(zip|gz) ${{ github.workspace }}/artifacts

      - name: Cleanup build
        shell: bash
        run: |
          rm -rf ${COREBINARYDIRECTORY}/ITK ${COREBINARYDIRECTORY}/ITK-build
          rm -rf ${COREBINARYDIRECTORY}/SimpleITK-build

      - name: Package CSharp
        if: runner.os != 'macOS'
        uses: ./.github/actions/package_csharp
        with:
          continue-on-error: true
          cmake_osx_architectures: ${{ matrix.cmake_osx_architectures || '' }}
      - name: Package Java
        if: ${{ !matrix.cmake_osx_architectures }}
        uses: ./.github/actions/package_java
        with:
          continue-on-error: true
          cmake_osx_architectures: ${{ matrix.cmake_osx_architectures || '' }}
      - name: Package Python 3.11
        uses: ./.github/actions/package_python
        with:
          python-version: 3.11
          use_limited_api: true
          cmake_osx_architectures: ${{ matrix.cmake_osx_architectures || '' }}
      - name: Package Python 3.10
        uses: ./.github/actions/package_python
        with:
          python-version: "3.10"
          cmake_osx_architectures: ${{ matrix.cmake_osx_architectures || '' }}
      - name: Package Python 3.14t
        uses: ./.github/actions/package_python
        with:
          python-version: "3.14t"
          continue-on-error: true
          cmake_osx_architectures: ${{ matrix.cmake_osx_architectures || '' }}
      - name: Upload Artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: artifacts-${{ matrix.os }}
          path: |
            ${{ github.workspace }}/artifacts/*.whl
            ${{ github.workspace }}/artifacts/*.zip
            ${{ github.workspace }}/artifacts/*.gz
  doxygen:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
        with:
          fetch-depth: 0
      - name: Build Docker Image for Doxygen
        run: |
          cd $GITHUB_WORKSPACE/Utilities/Doxygen/docker
          docker build -f Dockerfile -t simpleitk-doxygen .
      - name: Docker Doxygen generation
        run: |
          docker run \
                 --env SIMPLEITK_USE_ELASTIX=1 \
                 --mount type=bind,source=$GITHUB_WORKSPACE,destination=/work/SimpleITK,readonly \
                 --name sitk-dox simpleitk-doxygen
          mkdir -p artifacts
          TAG=$(git describe --tags --match=v\*)
          docker cp sitk-dox:/SimpleITKDoxygen.tar.gz artifacts/SimpleITKDoxygen-${TAG}.tar.gz
          docker cp sitk-dox:/SimpleITKDoxygenXML.tar.gz artifacts/SimpleITKDoxygenXML-${TAG}.tar.gz
      - name: Archive Doxygen Artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: doxygen-xml
          path: |
            artifacts/SimpleITKDoxygenXML-*.tar.gz
            artifacts/SimpleITKDoxygen-*.tar.gz

  sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v6
        with:
          python-version: "3.11"
      - name: Build sdist
        run: |
          pip install build
          python -m build --sdist
      - name: Upload sdist
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: artifacts-sdist
          path: dist/simpleitk-*.tar.gz

  publish-github:
    if: github.event_name != 'pull_request' && (github.ref_name == 'latest' || startsWith(github.ref_name, 'v'))
    environment:
      name: release
    permissions:
      contents: write  # for creating and uploading GitHub releases
    needs:
      - build
      - doxygen
      - package-docker
      - sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        id: download
        with:
          path: ${{ github.workspace }}/artifacts
      - name: Checksums
        shell: bash
        run: |
          find ${{ steps.download.outputs.download-path }} -type f \
            \( -name "*.gz" -o -name "*.whl" -o -name "*.zip" \) \
            | xargs sha256sum > checksums.txt
          echo "== checksums.txt =="
          cat checksums.txt
      - name: Set tag name
        id: tag
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          echo "TAG NAME: ${REF_NAME}" >> $GITHUB_STEP_SUMMARY
          echo "name=${REF_NAME}" >> $GITHUB_OUTPUT
      - name: Create Release Notes
        shell: bash
        env:
          TAG_NAME: ${{ steps.tag.outputs.name }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          DOWNLOAD_PATH: ${{ steps.download.outputs.download-path }}
        run: |
          echo "Tag Name: ${TAG_NAME}"
          if [ "${TAG_NAME}" == "latest" ]; then
            echo "This is an automatic packaging of SimpleITK based on the ${DEFAULT_BRANCH} branch. It contains the latest features and experimental developments." > notes.txt
          else
            echo "This is an automatic packaging of SimpleITK based on the ${TAG_NAME} tag." > notes.txt
          fi
          echo "

          To upgrade to this Python binary package run:
          \`\`\`pip install --upgrade --pre simpleitk --find-links https://github.com/SimpleITK/SimpleITK/releases/tag/${TAG_NAME}\`\`\`
          " >>notes.txt

          ${{ github.workspace }}/Utilities/Maintenance/GeneratePythonDownloadsPage.py \
            --hash md5 \
            --format gh \
            --tag "${TAG_NAME}" \
            $( find "${DOWNLOAD_PATH}" -type f  -name \*.whl ) \
          >> notes.txt

          echo "== notes.txt =="
          cat notes.txt

      - name: Check wheel metadata
        run: |
          pip install twine
          twine check $( find ${{ steps.download.outputs.download-path }} -name "*.whl" -o -name "simpleitk-*.tar.gz" )
      - name: Create Release and Upload Artifacts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ steps.tag.outputs.name }}
          REF_NAME: ${{ github.ref_name }}
          GIT_SHA: ${{ github.sha }}
          DOWNLOAD_PATH: ${{ steps.download.outputs.download-path }}
        run: |
          if [ "${TAG_NAME}" == "latest" ]; then
            gh release delete "${TAG_NAME}" --yes || true
          fi

          if [[  "${TAG_NAME}" == "latest" ||
              "${REF_NAME}" =~ ^v[0-9]+\.[0-9]+(\.[0-9]+)?((-.)?[a-zA-Z]+[0-9]*)$ ]]; then
            create_args="--prerelease"
          fi

          gh release create "${TAG_NAME}" \
            --target "${GIT_SHA}" \
            --verify-tag \
            --draft \
            --generate-notes \
            $create_args \
            --notes-file notes.txt \
            --title "Release ${REF_NAME}"
          gh release upload "${TAG_NAME}" $( find  "${DOWNLOAD_PATH}" -type f \( -name "*.whl" -o -name "*.zip" -o -name "*.gz" \) )

          if [ "${TAG_NAME}" == "latest" ]; then
            gh release edit "${TAG_NAME}" --draft=false
          fi

  publish-pypi:
    if: github.event_name != 'pull_request' && startsWith(github.ref_name, 'v')
    environment:
      name: release
    permissions:
      id-token: write  # for PyPI publish
    needs:
      - publish-github
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        id: download
        with:
          path: ${{ github.workspace }}/artifacts
      - name: Prepare for PyPI upload
        shell: bash
        run: |
          mkdir -p dist
          mv $( find  ${{ steps.download.outputs.download-path }} -type f \( -name "*.whl" -o -name "simpleitk-*.tar.gz" \) ) dist/
      - name: PyPI Publish package
        uses: pypa/gh-action-pypi-publish@ba38be9e461d3875417946c167d0b5f3d385a247
        with:
          repository-url: https://test.pypi.org/legacy/
